name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      # Web UI 模板的生成码（internal/webui/views/*_templ.go）是提交进仓库的，
      # 二进制里的 UI 以它为准；这里重新生成并比对，防止改了 .templ 忘跑
      # scripts/gentempl.sh 导致发布过期 UI。
      - name: Verify templ generated code is in sync
        run: |
          go install github.com/a-h/templ/cmd/templ@$(go list -m -f '{{.Version}}' github.com/a-h/templ)
          scripts/gentempl.sh
          git diff --exit-code -- internal/webui/views

      - name: Test
        run: go test ./...

      - name: Build
        env:
          CGO_ENABLED: "0"
        run: |
          VERSION="${GITHUB_REF_NAME}"
          LDFLAGS="-s -w -X github.com/reorx/hookploy/internal/version.Version=${VERSION}"
          for target in darwin/arm64 linux/amd64; do
            GOOS="${target%/*}"
            GOARCH="${target#*/}"
            outdir="dist/hookploy-${VERSION}-${GOOS}-${GOARCH}"
            mkdir -p "$outdir"
            GOOS="$GOOS" GOARCH="$GOARCH" go build -trimpath -ldflags "$LDFLAGS" -o "$outdir/hookploy" ./cmd/hookploy
            install -m 0755 scripts/hookploy-ctl.sh "$outdir/hookploy-ctl.sh"
            tar -C dist -czf "${outdir}.tar.gz" "$(basename "$outdir")"
          done
          (cd dist && sha256sum ./*.tar.gz > checksums.txt)

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" dist/*.tar.gz dist/checksums.txt \
            --title "hookploy ${GITHUB_REF_NAME}" \
            --generate-notes
